<!DOCTYPE html>
<html>
<head>
    <title>Campus Query Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="top-bar">
        <h2 class="gradient-3d">Campus Query Chatbot</h2>
    </div>

    <div class="container">
        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Type your question here...">
            <button onclick="sendQuestion()">Send</button>
            <button onclick="clearChat()" class="clear-btn">Clear</button>
        </div>
    </div>

<script>
let isBotTyping = false;

// - AUTO SCROLL -
function autoScroll() {
    const chatBox = document.getElementById("chat-box");
    chatBox.scrollTop = chatBox.scrollHeight;
}

// - SEND QUESTION -
async function sendQuestion() {
    if (isBotTyping) return;

    const input = document.getElementById("question");
    const chatBox = document.getElementById("chat-box");
    const q = input.value.trim();
    if (!q) return;

    // user message
    chatBox.innerHTML += `
        <div class="message user"><strong>You:</strong> ${q}</div>
    `;
    autoScroll();

    input.value = "";
    input.disabled = true;
    isBotTyping = true;

    // typing indicator
    const typingDiv = document.createElement("div");
    typingDiv.className = "message bot typing";
    typingDiv.innerHTML = "<em>CampusBot is typing</em>";
    chatBox.appendChild(typingDiv);
    autoScroll();

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q })
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        const data = await response.json();

        typingDiv.remove();

        chatBox.innerHTML += `
            <div class="message bot">
                <strong>IILM:</strong> ${data.answer}
            </div>
        `;
        autoScroll();

    } catch (error) {
        typingDiv.remove();
        chatBox.innerHTML += `
            <div class="message bot">
                <strong>IILM:</strong> Sorry, something went wrong.
            </div>
        `;
        autoScroll();
    } finally {
        isBotTyping = false;
        input.disabled = false;
        input.focus();
    }
}

// - CLEAR CHAT -
function clearChat() {
    document.getElementById("chat-box").innerHTML = "";
}

// - ENTER KEY -
document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("question").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            sendQuestion();
        }
    });
});
</script>


</body>
</html>
